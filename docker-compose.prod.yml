version: '3.8'

# ── Production docker-compose ─────────────────────────────────────────────
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Required env file: .env.prod (copy from .env.example and fill in)

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       meetsync
      POSTGRES_USER:     meetsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetsync"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [meetsync]

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [meetsync]

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://meetsync:${POSTGRES_PASSWORD}@postgres:5432/meetsync
      REDIS_URL:    redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - /tmp/meetsync-uploads:/tmp/meetsync-uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [meetsync]

  # ── Pipeline Worker (separate process) ──────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: node src/workers/pipelineWorker.js
    env_file: .env.prod
    environment:
      NODE_ENV:          production
      DATABASE_URL:      postgresql://meetsync:${POSTGRES_PASSWORD}@postgres:5432/meetsync
      REDIS_URL:         redis://redis:6379
      WORKER_CONCURRENCY: 3
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - /tmp/meetsync-uploads:/tmp/meetsync-uploads
    networks: [meetsync]

  # ── Frontend + Nginx ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend: { condition: service_healthy }
    networks: [meetsync]

  # ── Database migrations (run-once) ───────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node src/models/migrate.js
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://meetsync:${POSTGRES_PASSWORD}@postgres:5432/meetsync
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"
    networks: [meetsync]

volumes:
  postgres_data:
  redis_data:

networks:
  meetsync:
    driver: bridge
